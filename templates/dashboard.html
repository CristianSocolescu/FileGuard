<!DOCTYPE html>
<html>
<head>
    <title>Cyber Security Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Security Scan Results</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Filename</th>
                <th>Type</th>
                <th>Suspicious</th>
                <th>VT Found</th>
                <th>VT Malicious</th>
                <th>VT Suspicious</th>
                <th>VT Error</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr class="{{ 'table-danger' if log[3] else 'table-success' }}">
                <td>{{ log[1] }}</td> <td>{{ log[2] }}</td> <td>{{ 'YES' if log[3] else 'NO' }}</td> <td>{{ 'YES' if log[4] else 'NO' }}</td> <td>{{ log[5] }}</td> <td>{{ log[6] }}</td> <td>{{ log[7] if log[7] else '-' }}</td> <td>{{ log[8] }}</td> </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
